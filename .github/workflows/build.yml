# .github/workflows/build.yml  (D-01)
#
# Cross-platform CI matrix — the CANONICAL producer + verifier of the
# Windows .exe/Setup.exe and macOS .app. Dev/test is macOS-only, so this
# matrix is how the real Windows artifact gets built and smoke-tested at all.
#
# Gate policy (RESEARCH Open Q4 / A7 — encode honestly, do NOT pretend CI proves SC2):
#   * `npm run make`        = HARD gate. The artifact MUST build on both legs.
#                             No continue-on-error — a make failure fails the leg.
#   * `npm run test:smoke`  = STRONG-PREFERRED gate. WDIO drives the PACKAGED
#                             binary (the ASAR-internal PTY round-trip, SC3).
#                             GitHub windows-latest/macos-latest runners have a
#                             desktop session so Electron+WDIO normally run headed.
#                             If smoke proves flaky for lack of a stable display,
#                             it is best-effort (relaxed ONLY on observed flake,
#                             noted in the plan SUMMARY) — NOT a phase blocker.
#   * canonical `claude --rc` human-verify = the BINDING SC2 gate (CI runners
#                             lack `claude`; that gate lives in the human-verify
#                             checkpoint, not here).
#
# Secrets: ZERO. The build is UNSIGNED this phase (D-04) — maker-squirrel is
# unsigned by default (no Windows signing config) and osxSign/osxNotarize are
# env-gated off. No signing credential is referenced or required.
#
# Native module: node-pty ships a per-triple N-API prebuild, so NO Python /
# node-gyp / network-mandatory native rebuild is needed (D-06). The
# opportunistic, non-fatal rebuild + spawn-helper chmod happens in `postinstall`
# (scripts/fix-node-pty.cjs) during `npm ci` — do NOT add a standalone native
# rebuild step here.
name: build

on: [push, pull_request]

jobs:
  make:
    strategy:
      # A Windows-only flake must not kill the macOS leg (and vice versa).
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # postinstall (fix-node-pty.cjs) runs here: opportunistic online rebuild
      # + spawn-helper chmod. node-pty's prebuild ships in the tarball, so this
      # is non-fatal offline (D-06).
      - run: npm ci
      # HARD gate — Forge package + maker-squirrel (win) / maker-zip (mac), UNSIGNED.
      - run: npm run make
      # STRONG-PREFERRED gate — WDIO against the PACKAGED binary; the
      # OS-conditional appBinaryPath (Plan 01) picks the right binary per leg.
      # This is the SC3 ASAR-internal PTY round-trip proof on Windows.
      - run: npm run test:smoke
      - uses: actions/upload-artifact@v4
        with:
          name: just-wrapper-${{ matrix.os }}
          path: out/make/**
